name: container_builder

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      username:
        required: true
        type: string
      images:
        required: true
        type: string
      push:
        required: true
        type: boolean
      platform:
        default: ''
        required: false
        type: string
    secrets:
      password:
        required: true

jobs:
  build:
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        image: ${{fromJson(inputs.images)}}
    defaults:
      run:
        shell: bash
        working-directory: ./${{matrix.image}}
    env:
      image_tag: ${{inputs.registry}}/${{inputs.username}}/${{matrix.image}}:latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v2
        
      - name: Login to Registry
        run: echo ${{secrets.password}} | docker login ${{inputs.registry}} -u ${{inputs.username}} --password-stdin

      - name: Setup QEMU
        if: inputs.platform != ''
        uses: docker/setup-qemu-action@v1
        with:
          platforms: ${{inputs.platform}}

      - name: Setup Docker Buildx
        if: inputs.platform != ''
        uses: docker/setup-buildx-action@v1
        with:
          install: true
        
      - name: Run pre_build Script
        run: |
          if [ -e ./pre_build.sh ] ; then
            ./pre_build.sh
          fi
        
      - name: Build Container
        id: build
        run: |
          extra_args=
          if [ -n "${{inputs.platform}}" ] ; then
            extra_args="--load --platform ${{inputs.platform}}"
          fi
          docker build --pull $extra_args -t ${{env.image_tag}} .

      - name: Scan Container with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{env.image_tag}}
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          timeout: 10m0s

      - name: Scan Container with Dockle
        uses: NikLeberg/dockle-action@main
        with:
          image: ${{env.image_tag}}
          report-format: sarif
          report-name: dockle-results
          timeout: 10m

      - name: Upload Scan Results
        uses: github/codeql-action/upload-sarif@v1
        if: always()
        with:
          sarif_file: .
        
      - name: Run post_build Script
        run: |
          if [ -e ./post_build.sh ] ; then
            ./post_build.sh
          fi
        
      - name: Push Container
        if: ${{inputs.push}}
        run: docker push ${{env.image_tag}}

      - name: Logout of Registry
        run: docker logout ${{inputs.registry}}
